name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src/weaverx

      - name: Pytest with coverage
        run: pytest -m "not network" --cov=weaverx --cov-report=term-missing --cov-fail-under=75

      - name: Dependency audit
        run: |
          pip install pip-audit
          cat > /tmp/audit-reqs.txt <<'EOF'
          httpx>=0.27.0
          litellm>=1.40.0
          pydantic>=2.7.0
          rich>=13.7.0
          typer>=0.12.0
          EOF
          pip-audit -r /tmp/audit-reqs.txt --strict
